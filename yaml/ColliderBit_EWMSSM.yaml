##########################################################################
## GAMBIT configuration for running a few CMSSM points using only
## ColliderBit likelihoods (LHC and LEP particle searches, LHC and LEP
## Higgs data).
##
## SM nuisance parameters are fixed to default values, and no astrophysical
## nuisance parameters are used. See the ColliderBit paper for more details.
##########################################################################

# NB: This example yaml file uses flexiblesusy, so make sure you have
# built gambit with -DBUILD_FS_MODELS="CMSSM"


Parameters:

  # SM nuisance parameters fixed for now.
  StandardModel_SLHA2: !import yaml_files/include/StandardModel_SLHA2_defaults.yaml

  MSSM11atQ_mA_mG:
    M1: 900
      # prior_type: flat
      # range: [-1500, 1500]
    M2:
      prior_type: flat
      range: [100, 500]
    mu:
      prior_type: flat
      range: [-500, -100]
    TanBeta: 1.0001 # 10
      # prior_type: flat
      # range: [1, 70]
    mG: 1.0e-9
    Ad_3: 0.0
    Ae_3: 0.0
    Au_3: 0.0
    M3: 5.0e3
    Qin: 3.0e3
    mA: 5.0e3
    ml2: 9.0e6
    mq2: 9.0e6

  # Test point
  # MSSM11atQ_mA_mG:
  #   M1: 900.
  #   M2: 400.
  #   mu: 200.
  #   TanBeta: 1.0 # 28.5021
  #   mG: 1.0e-9
  #   Ad_3: 0.0
  #   Ae_3: 0.0
  #   Au_3: 0.0
  #   M3: 5.0e3
  #   Qin: 3.0e3
  #   mA: 5.0e3
  #   ml2: 9.0e6
  #   mq2: 9.0e6


Priors:

  # All priors simple, so specified in Parameters section


Printer:

  # These lines tell GAMBIT to use the hdf5 printer
  # Can switch to the ascii printer by commenting out and
  # using the ascii lines below

  # printer: cout

  # printer: hdf5
  # options:
  #   output_file: "ColliderBit_CMSSM.hdf5"
  #   group: "/ColliderBit_CMSSM"
  #   delete_file_on_restart: true

  printer: ascii
  options:
    output_file: "scan_mu_1e7_tanB1.txt"
    delete_file_on_restart: true


Scanner:

  use_scanner: grid

  scanners:

    multinest:
      plugin: multinest
      like:  LogLike
      nlive: 4000
      tol: 0.5

    random:
      plugin: random
      point_number: 1
      output_file:  output
      like:  LogLike
      files:
        output_file: "weights ..."

    de:
      plugin: diver
      like: LogLike
      NP: 19200
      convthresh: 1e-5
      verbosity: 1

    grid:
      # plugin: pygrid
      plugin: grid
      #version: ">=1.0"
      like: LogLike
      grid_pts: [9, 9] 


ObsLikes:

    # Calculate the LHC likelihood
    - purpose:    LogLike
      capability: LHC_Combined_LogLike
      # sub_capabilities:
      #   skip_analyses:

    # - purpose:    LogLike
    #   capability: LHC_Higgs_LogLike

    # - purpose:    LogLike
    #   capability: LHC_measurements_LogLike

    # Calculate the LEP likelihoods
    # - purpose:    LogLike
    #   capability: LEP_Higgs_LogLike

    # - purpose:    LogLike
    #   capability: ALEPH_Selectron_LLike

    # - purpose:    LogLike
    #   capability: ALEPH_Smuon_LLike

    # - purpose:    LogLike
    #   capability: ALEPH_Stau_LLike

    # - purpose:    LogLike
    #   capability: L3_Selectron_LLike

    # - purpose:    LogLike
    #   capability: L3_Smuon_LLike

    # - purpose:    LogLike
    #   capability: L3_Stau_LLike

    # - purpose:    LogLike
    #   capability: L3_Neutralino_All_Channels_LLike

    # - purpose:    LogLike
    #   capability: L3_Neutralino_Leptonic_LLike

    # - purpose:    LogLike
    #   capability: L3_Chargino_All_Channels_LLike

    # - purpose:    LogLike
    #   capability: L3_Chargino_Leptonic_LLike

    # - purpose:    LogLike
    #   capability: OPAL_Chargino_Hadronic_LLike

    # - purpose:    LogLike
    #   capability: OPAL_Chargino_SemiLeptonic_LLike

    # - purpose:    LogLike
    #   capability: OPAL_Chargino_Leptonic_LLike

    # - purpose:    LogLike
    #   capability: OPAL_Chargino_All_Channels_LLike

    # - purpose:    LogLike
    #   capability: OPAL_Neutralino_Hadronic_LLike

    # # Other observables
    - purpose:    Observable
      capability: LHC_LogLike_per_analysis

    - purpose:    Observable
      capability: LHC_signals

    - purpose:    Observable
      capability: LHCEventLoopInfo

    # - purpose:    Observable
    #   capability: LHC_measurements_LogLike_perPool

    - purpose:    Observable
      capability: SLHA1_violation

    - purpose:    Observable
      capability: MSSM_spectrum
      type:       map_str_dbl


Rules:

  # Choose to get decays from DecayBit proper, not from an SLHA file.
  - capability: decay_rates
    function: all_decays

  # Treat issues with decay widths as invalid points rather than fatal error
  - if: 
      function: any
    then:
      options:
        invalid_point_for_negative_width: true


  # Require a small, additional mass difference before switching on new decay decay modes in the
  # limit of small chargino--neutralino mass difference. Can help avoid problems with chargino
  # decays in Pythia (due to Pythia's MSAFETY check).
  - capability: chargino_plus_1_decay_rates_smallsplit
    function: chargino_plus_1_decays_smallsplit
    options:
      m_safety: 0.0011

  # Choose which branching fractions to save
  - capability: branching_fractions_as_map
    function: get_branching_fractions_as_map
    options:
      # printall: true
      BFs: [
              ["~chi0_1",  "gamma", "~G"],
              ["~chi0_1",  "Z0", "~G"],
              ["~chi0_1",  "h0_1", "~G"],
              ["~chi0_1",  "W+", "~chi-_1"],
              ["~chi0_2",  "gamma", "~G"],
              ["~chi0_2",  "Z0", "~G"],
              ["~chi0_2",  "Z0", "~chi0_1"],
              ["~chi0_2",  "h0_1", "~G"],
              ["~chi0_2",  "h0_1", "~chi0_1"],
              ["~chi0_2",  "W+", "~chi-_1"],
              ["~chi0_2",  "W+", "~chi-_2"],
              ["~chi0_3",  "gamma", "~G"],
              ["~chi0_3",  "Z0", "~G"],
              ["~chi0_3",  "Z0", "~chi0_1"],
              ["~chi0_3",  "Z0", "~chi0_2"],
              ["~chi0_3",  "h0_1", "~G"],
              ["~chi0_3",  "h0_1", "~chi0_1"],
              ["~chi0_3",  "h0_1", "~chi0_2"],
              ["~chi0_3",  "W+", "~chi-_1"],
              ["~chi0_3",  "W+", "~chi-_2"],
              ["~chi0_4",  "gamma", "~G"],
              ["~chi0_4",  "Z0", "~G"],
              ["~chi0_4",  "Z0", "~chi0_1"],
              ["~chi0_4",  "Z0", "~chi0_2"],
              ["~chi0_4",  "Z0", "~chi0_3"],
              ["~chi0_4",  "h0_1", "~G"],
              ["~chi0_4",  "h0_1", "~chi0_1"],
              ["~chi0_4",  "h0_1", "~chi0_2"],
              ["~chi0_4",  "h0_1", "~chi0_3"],
              ["~chi0_4",  "W+", "~chi-_1"],
              ["~chi0_4",  "W+", "~chi-_2"],
              ["~chi+_1",  "W+", "~G"],
              ["~chi+_1",  "W+", "~chi0_1"],
              ["~chi+_1",  "W+", "~chi0_2"],
              ["~chi+_1",  "W+", "~chi0_3"],
              ["~chi+_1",  "W+", "~chi0_4"],
              ["~chi+_2",  "Z0", "~chi+_1"],
              ["~chi+_2",  "h0_1", "~chi+_1"],
              ["~chi+_2",  "W+", "~G"],
              ["~chi+_2",  "W+", "~chi0_1"],
              ["~chi+_2",  "W+", "~chi0_2"],
              ["~chi+_2",  "W+", "~chi0_3"],
              ["~chi+_2",  "W+", "~chi0_4"],
            ]

  # Choose to get the spectrum from SpecBit proper, not an SLHA file.
  # Options set to match benchmark point specified in SpecBit/MSSM_benchmark_points/LesHouches.in.MSSM_1
  - capability: unimproved_MSSM_spectrum
    function: get_MSSMatQ_mA_spectrum_FS
    options:
      precision_goal:        1.0e-4
      max_iterations:        0
      calculate_sm_masses:   false
      pole_mass_loop_order:  2
      ewsb_loop_order:       2
      beta_loop_order:       2
      threshold_corrections_loop_order: 2
      use_higgs_2loop_at_as: true
      use_higgs_2loop_ab_as: true
      use_higgs_2loop_at_at: true
      use_higgs_2loop_atau_atau: true
      invalid_point_fatal: false
      # Only consider chargino masses > 45 GeV as masses lighter than this are excluded by
      # LEP measurements of the Z width.
      mass_cut: [ ["|~chi+_1|", 45., 1e6] ]
      # For this study we set the Higgs mass by hand.
      override_FS_pole_masses:
        h0_1: 125.09
      # LSP check
      only_neutralino_LSP: false
      only_gravitino_LSP: true


  # This simply relables the "unimproved_MSSM_spectrum" to "MSSM_spectrum",
  # so that things depending on "MSSM_spectrum" will be happy.
  - capability: MSSM_spectrum
    type: Spectrum
    function: make_MSSM_precision_spectrum_none

  # Globally permit maximal mixing between gauge and family eigenstates
  - if: 
      function: any
    then:
      options:
        gauge_mixing_tolerance: 0.5
        family_mixing_tolerance: 0.5

  # Choose to use functions that get Higgs decays from SUSY-HIT, and t decays from DecayBit native implementation (instead of FeynHiggs)
  - capability: Higgs_decay_rates
    function: MSSM_h0_1_decays
  - capability: h0_2_decay_rates
    function: h0_2_decays
  - capability: A0_decay_rates
    function: A0_decays
  - capability: H_plus_decay_rates
    function: H_plus_decays
  - capability: t_decay_rates
    function: t_decays

  # Pass an SLHA2 spectrum to Pythia
  - capability: SpectrumAndDecaysForPythia
    function: getSpectrumAndDecaysForPythia
    options:
      slha_version: 2
      write_summary_to_log: false

  # Choose to where to get cross-sections from
  - capability: TotalCrossSection
    function: getEvGenCrossSection_as_base

  # Just use unweighted cross-sections
  - capability: EventWeighterFunction
    function: setEventWeight_unity

  # Choose where to get scattering events from
  - capability: HardScatteringEvent
    type: Pythia_default::Pythia8::Event
    function: generateEventPythia
    # options:
    #   drop_HepMC3_file: true

  - capability: HardScatteringEvent
    type: HEPUtils::Event
    function: generateEventPythia_HEPUtils

  # - capability: HardScatteringEvent
  #   type: HepMC3::GenEvent
  #   function: generateEventPythia_HepMC

  # @Isabel: Tipper du må kommentere ut denne "PerformInitialCrossSection"-blokka.
  #- capability: PerformInitialCrossSection
  #  function: PerformInitialCrossSection_Pythia
  #  options:
  #    silenceLoop: false
  #    LHC_13TeV:
  #      nEvents: 10000
  #      maxFailedEvents: 10
  #      pythia_settings:
  #        - Beams:eCM = 13000
  #        - Next:numberShowProcess = 1
  #        - Print:quiet = off # on
  #        - Random:setSeed = on
  #        - PartonLevel:MPI = off
  #        - PartonLevel:ISR = on
  #        - PartonLevel:FSR = on
  #        - HadronLevel:all = on
  #        - SUSY:all = off
  #        - SUSY:qqbar2chi0chi0 = on
  #        - SUSY:qqbar2chi+-chi0 = on
  #        - SUSY:qqbar2chi+chi- = on
  #        - TauDecays:mode = 0
  #        - TimeShower:pTmin = 2
  #        - 23:mMin = 0.1
  #        - 24:mMin = 0.1


  # Choose colliders to simulate and their convergence settings, and pick analyses to run with each collider.
  # NOTE: The second collider configuration below ("LHC_13TeV_antiktR_1") is only needed to simulate the
  #       search ATLAS_13TeV_2BoostedBosons_139invfb. 
  - capability: RunMC
    function: operateLHCLoop
    options:
      silenceLoop: false
      # @Isabel: Tipper du må kommentere ut de to neste linjene
      #    use_colliders:
      #  - LHC_13TeV
      LHC_13TeV:
        min_nEvents: 10000000
        max_nEvents: 10000000
        events_between_convergence_checks: 1000000000
        target_fractional_uncert: 0.1
        halt_when_systematic_dominated: false
        all_analyses_must_converge: true
        all_SR_must_converge: false
        maxFailedEvents: 100
        analyses:
          - ATLAS_Isabel
          # - ATLAS_13TeV_0LEPStop_139invfb        # [in skip_analyses] New! (Martin)  

  # Choose Monte Carlo event simulator and options.
  - capability:  HardScatteringSim
    type: Py8Collider_defaultversion
    function: getPythia # getPythia_SLHA
    options:
      LHC_13TeV:
        # 0.028 fb corresponds to ~1 expected event at L = 36 fb^-1.
        xsec_veto: 0.0
        partonOnly: false
        jet_collections:
          antikt_R04:
            algorithm: antikt
            R: 0.4
            recombination_scheme: E_scheme
            strategy: Best
        jet_collection_taus: antikt_R04
        pythia_settings:
          - Beams:eCM = 13000
          - Next:numberShowProcess = 1
          - Print:quiet = on  #sto off orginalt
          - Random:setSeed = on
          - PartonLevel:MPI = off
          - PartonLevel:ISR = on
          - PartonLevel:FSR = on
          - HadronLevel:all = on
          - SUSY:all = off
          - SUSY:qqbar2chi0chi0 = on
          - SUSY:qqbar2chi+-chi0 = on
          - SUSY:qqbar2chi+chi- = on
          # - SUSY:idVecA = 1000022,1000023,1000024
          # - SUSY:idVecB = 1000022,1000023,1000024
          - TauDecays:mode = 0
          - TimeShower:pTmin = 2
          - 23:mMin = 0.1
          - 24:mMin = 0.1

  # Choose LHC likelihood form and options.
  - capability: LHC_LogLikes
    # Choose not to use the FullLikes backend.
    function: calc_LHC_LogLikes
    # Choose to use the FullLikes backend when applicable
    #function: calc_LHC_LogLikes_full
    backends:
    - {group: lnlike_marg_poisson, capability: lnlike_marg_poisson_lognormal_error}
    options:
      use_covariances: true
      use_marginalising: false
      combine_SRs_without_covariances: false
      nuisance_prof_initstep: 0.1
      nuisance_prof_convtol: 0.01
      nuisance_prof_maxsteps: 10000
      nuisance_prof_convacc: 0.01
      nuisance_prof_simplexsize: 1e-5
      nuisance_prof_method: 6
      nuisance_prof_verbosity: 0
      # covariance_marg_convthres_abs: 0.05
      # covariance_marg_convthres_rel: 0.05
      # covariance_nsamples_start: 1000000
      calc_noerr_loglikes: true
      calc_expected_loglikes: true
      calc_expected_noerr_loglikes: true

  # Options for how the combined LHC loglike should be calculated
  - capability: LHC_Combined_LogLike
    options:
      write_summary_to_log: false
      cap_loglike: false
      cap_loglike_individual_analyses: false
      # skip_analyses:

  - capability: AllAnalysisNumbers
    options:
     print_cutflows: true
     normalized_cutflows: true



KeyValues:

  rng:
    generator: default
    seed: -1

  dependency_resolution:
    prefer_model_specific_functions: true
    unused_rule_is_an_error: false

  dependency_resolution:
    prefer_model_specific_functions: true

  likelihood:
    model_invalid_for_lnlike_below: -5e5
    print_invalid_points: true

  # @Isabel: Her velger du hvilken mappe GAMBIT skal skrive output-filer til
  default_output_path: "runs/ColliderBit_EWMSSM/"

  debug: true


